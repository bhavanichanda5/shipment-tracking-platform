spring.application.name=backend

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/shipment_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# it enables, Hibernate prints SQL in a nicely formatted way....It makes SQL easier to read.
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Dialect ;  Every database understands SQL a little differently. if mySQL, PostgreSQL, Oracle, SQL Server, etc. Hibernate needs to know which database you are using so that it can generate the appropriate SQL for that database. This is done by specifying the dialect in the configuration. In this case, we are using PostgreSQL, so we specify the PostgreSQL dialect.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server        ; When Spring Boot starts ....Tomcat started on port(s): 8080....... then your application runs at   http://localhost:9090
server.port=8080